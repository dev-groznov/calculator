<!DOCTYPE html>
<html>
    <head leng="en">
        <title>Calculator</title>
        <meta charset="UTF-8">
        <script src="./script.js" defer></script>
    </head>

    <body>
        <div class="content">
            <p contenteditable="true" class='display'></p>
            <div class="digits">
            </div>
            <div class="signs">
                <button id="+">+</button>
                <button id="-">-</button>
                <button id="*">*</button>
                <button id="/">/</button>
                <button id="=">=</button>
                <button id="clear">C</button>
                <button id="point">.</button>
                <button id="back">↩</button>
            </div>
        </div>      
    </body>
</html>
